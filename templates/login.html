<!DOCTYPE html>
<html>

<head>
<title>System Monitor Login</title>
<link rel="icon" type="image/x-icon" href="/static/r_logo.png">


<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 25px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4facfe;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #007bff;
}

.credit {
    margin-top: 20px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="login-box">

<h2>System Monitor Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<br><br>

<button type="submit">Login</button>

</form>

<div class="credit">
Designed by <b>Rochana</b>
</div>

</div>

</body>

</html>
